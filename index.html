<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuqua Valley Chess | Official Club Site</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">NVHS<span>CHESS</span></div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#roster">Roster</a></li>
                <li><a href="#schedule">Schedule</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero">
        <div class="hero-content">
            <h1>Wildcat Strategy.</h1>
            <p>Home of the 2026 IHSA State 5th Place Finalists.</p>
            <a href="https://www.chess.com/club/neuqua-valley-high-school" class="btn">Join the Club</a>
        </div>
    </section>

    <section id="stats">
        <div class="container">
            <div class="stat-card">
                <h3>5th</h3>
                <p>In State (2026)</p>
            </div>
            <div class="stat-card">
                <h3>Tues/Thurs</h3>
                <p>Weekly Meetings</p>
            </div>
            <div class="stat-card">
                <h3>DVC</h3>
                <p>Conference Leaders</p>
            </div>
        </div>

    <script src="script.js"></script>

</html>
