<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuqua Valley Chess | Official Club Site</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="image/logo.png" alt="NVHS Chess Logo" style="height: 40px; vertical-align: middle; margin-right: 10px;">
                NVHS<span>CHESS</span>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="roster.html">Roster</a></li>
                <li><a href="schedule.html">Schedule</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero">
        
        <div class="carousel-container">

            <div class="slide fade">
                <img src="image/Copy of 20260131_185654 (1).jpg" alt="T0">
                <div class="caption">Sections Undefeated Champions</div>
            </div>
            
            <div class="slide fade">
                <img src="image/T1.jpg" alt="T1">
                <div class="caption">West Chicago #1 + 2x Individual Champions</div>
            </div>

            <div class="slide fade">
                <img src="image/T2.jpg" alt="T2">
                <div class="caption">Niles North 2x #1</div>
            </div>

            <div class="slide fade">
                <img src="image/T3.jpg" alt="T3">
                <div class="caption">Brolingbrook Winners</div>
            </div>

            <div class="slide fade">
                <img src="image/T4.jpg" alt="T4">
                <div class="caption">Joliet Champions</div>
            </div>

            <div class="slide fade">
                <img src="image/T5.jpg" alt="T5">
                <div class="caption">Niles North Champions</div>
            </div>

            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
    </section>

    <section id="stats">
        <div class="container">
            <div class="stat-card">
                <h3>5th</h3>
                <p>In State (2026)</p>
            </div>
            <div class="stat-card">
                <h3>Tues/Thurs</h3>
                <p>Weekly Meetings</p>
            </div>
            <div class="stat-card">
                <h3>DVC</h3>
                <p>Conference Leaders</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
